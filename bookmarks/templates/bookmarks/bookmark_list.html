<!DOCTYPE html>
<html>
<head>
    <title>Smart Bookmark Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2, #ff6a88);
            background-size: 300% 300%;
            animation: gradientMove 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .main-box {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            padding: 50px;
            width: 95%;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            color: #00f5d4;
            font-size: 30px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .add-btn {
            background: linear-gradient(90deg, #00f5d4, #00bbf9);
            color: #0f172a;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }

        .add-btn:hover {
            transform: scale(1.05);
        }

        .bookmark-card {
            background: rgba(30, 41, 59, 0.9);
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            transition: 0.3s;
            border-left: 4px solid #00f5d4;
        }

        .bookmark-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .bookmark-title {
            color: white;
            font-weight: 600;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            text-decoration: none;
            margin-right: 5px;
            color: white;
        }

        .visit { background: #00bbf9; }
        .edit { background: #f59e0b; }
        .delete { background: #ef4444; }

        .visit:hover { background: #0096c7; }
        .edit:hover { background: #d97706; }
        .delete:hover { background: #dc2626; }

        .empty {
            color: #e2e8f0;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="main-box text-center">

    <div class="title">SMART BOOKMARK MANAGER</div>
    <div class="subtitle">Manage your digital world efficiently</div>

    <a href="{% url 'bookmark_create' %}" class="add-btn">
        + Add New Bookmark
    </a>

    {% if bookmarks %}
        {% for bookmark in bookmarks %}
            <div class="bookmark-card text-start">
                <div class="bookmark-title">{{ bookmark.title }}</div>
                <div style="margin-top:10px;">
                    <a href="{{ bookmark.url }}" target="_blank" class="btn visit">Visit</a>
                    <a href="{% url 'bookmark_update' bookmark.id %}" class="btn edit">Edit</a>
                    <a href="{% url 'bookmark_delete' bookmark.id %}" class="btn delete">Delete</a>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="empty">🚀 No bookmarks yet. Start adding now!</div>
    {% endif %}

</div>

</body>
</html>
